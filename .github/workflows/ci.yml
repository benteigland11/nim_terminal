name: Terminal CI v2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install MinGW (Windows)
      if: runner.os == 'Windows'
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: 'stable'
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxxf86vm-dev libxinerama-dev libxcursor-dev libxi-dev libxrandr-dev libgl1-mesa-dev

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install glfw

    - name: Install Nimble Packages
      run: nimble install -y

    - name: Build Terminal
      run: nim c -d:release -o:nim_terminal src/nim_terminal.nim

    - name: Run Tests
      run: nim c -r -d:release --path:. src/test_terminal.nim
