[app]
title = Waymark - Built with Nim
logo = logo.svg

[shell]
start_directory = ~

[font]
size = 20
primary = resources/JetBrainsMono-Medium.otf
fallbacks = ~/.local/share/fonts/JetBrainsMonoNerd/JetBrainsMonoNerdFont-Regular.ttf,/usr/share/fonts/google-noto/NotoSansSymbols2-Regular.ttf,/usr/share/fonts/google-noto-vf/NotoSansSymbols[wght].ttf,/usr/share/fonts/google-noto-emoji-fonts/NotoEmoji-Regular.ttf,/usr/share/fonts/google-noto-color-emoji-fonts/Noto-COLRv1.ttf,/usr/share/fonts/dejavu-sans-fonts/DejaVuSans.ttf

[chrome]
title_bar_height = 30
tab_bar_height = 28

[theme]
background = #050607

[terminal]
scrollback = 10000
max_panes = 8

[diagnostics]
capacity = 256

[resources]
glyph_atlas_size = 2048
